---
- name: Ansible로 EKS 클러스터 구축 및 ArgoCD 완전 자동화 세팅
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    cluster_name: "hybrid-gitops-eks"
    region: "ap-northeast-2"
    kubernetes_version: "1.29"

  tasks:
    - name: 1. eksctl 환경 설정 파일 생성 (Template 활용)
      template:
        src: ./eksctl-config.yaml.j2
        dest: ./eksctl-config.yaml

    - name: 2. eksctl을 통한 EKS 클러스터 및 네트워크 인프라 생성 (약 15분 소요)
      command: eksctl create cluster -f ./eksctl-config.yaml
      register: eks_creation
      changed_when: true

    - name: 3. 생성된 EKS 클러스터 접속 정보(Kubeconfig) 복사 및 로컬 연결
      command: "aws eks update-kubeconfig --region {{ region }} --name {{ cluster_name }}"

    - name: 4. ArgoCD 배포를 위한 쿠버네티스 Namespace 생성
      command: "kubectl create namespace argocd"
      ignore_errors: yes # 이미 존재할 경우 패스

    - name: 5. EKS 클러스터 내부에 ArgoCD 엔진 공식 매니페스트 설치
      command: "kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml"

    - name: 6. 외부 브라우저 접속을 위해 ArgoCD 서버를 LoadBalancer 타입으로 변경
      command: "kubectl patch svc argocd-server -n argocd -p '{\"spec\": {\"type\": \"LoadBalancer\"}}'"

    - name: 7. ArgoCD 대시보드 진입용 초기 어드민 비밀번호 추출
      shell: "kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d"
      register: argocd_password

    - name: 8. AWS가 발급한 외부 접속용 LoadBalancer DNS 주소 획득
      shell: "kubectl get svc argocd-server -n argocd -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'"
      register: argocd_url
      until: argocd_url.stdout != ""
      retries: 10
      delay: 10

    - name: 🎉 [인프라 구축 완료 보고서]
      debug:
        msg:
          - "=========================================================="
          - " EKS 클러스터 주소: {{ cluster_name }} 생성 완료"
          - " ArgoCD 대시보드 URL: http://{{ argocd_url.stdout }}"
          - " ArgoCD 초기 ID: admin"
          - " ArgoCD 초기 Password: {{ argocd_password.stdout }}"
          - "=========================================================="