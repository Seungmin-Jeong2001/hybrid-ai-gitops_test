---
- name: EKS 클러스터 위에 ArgoCD 및 Cloudflare Tunnel 설치 자동화
  hosts: localhost
  connection: local
  gather_facts: no

  tasks:
    - name: 1. 테라폼이 생성한 EKS 클러스터 접속 정보(Kubeconfig) 갱신
      command: "aws eks update-kubeconfig --region {{ region }} --name {{ cluster_name }}"

    - name: 2. ArgoCD 배포를 위한 Namespace 생성
      command: "kubectl create namespace argocd"
      ignore_errors: yes

    - name: 3. EKS 클러스터 내부에 ArgoCD 엔진 설치
      command: "kubectl apply --server-side --force-conflicts -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml"

    - name: 4. ArgoCD Pod가 준비될 때까지 대기
      command: "kubectl wait --for=condition=Ready pods --all -n argocd --timeout=300s"

    - name: 5. ArgoCD 대시보드 진입용 초기 어드민 비밀번호 추출
      shell: "kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d"
      register: argocd_password
      retries: 10
      delay: 5
      until: argocd_password.rc == 0

    # - name: 6. Cloudflare Tunnel (cloudflared) 에이전트 배포
    #   shell: |
    #     kubectl apply -f - <<EOF
    #     apiVersion: apps/v1
    #     kind: Deployment
    #     metadata:
    #       name: cloudflared
    #       namespace: kube-system
    #     spec:
    #       selector:
    #         matchLabels:
    #           app: cloudflared
    #       template:
    #         metadata:
    #           labels:
    #             app: cloudflared
    #         spec:
    #           containers:
    #           - name: cloudflared
    #             image: cloudflare/cloudflared:latest
    #             args:
    #             - tunnel
    #             - --no-autoupdate
    #             - run
    #             - --token
    #             - {{ cloudflare_tunnel_token }}
    #     EOF

    - name: 7. KServe 의존성 Cert-Manager 설치
      command: "kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.0/cert-manager.yaml"

    - name: 7-1. Cert-Manager가 준비될 때까지 대기
      command: "kubectl wait --for=condition=Available deployment --all -n cert-manager --timeout=300s"

    - name: 8. KServe 설치 (RawDeployment 모드)
      shell: |
        kubectl apply -f https://github.com/kserve/kserve/releases/download/v0.11.0/kserve.yaml
        kubectl apply -f https://github.com/kserve/kserve/releases/download/v0.11.0/kserve-runtimes.yaml

    - name: 8-1. KServe Webhook을 위한자체 서명 인증서 생성
      shell: |
        kubectl apply -f - <<EOF
        apiVersion: cert-manager.io/v1
        kind: Issuer
        metadata:
          name: selfsigned-issuer
          namespace: kserve
        spec:
          selfSigned: {}
        ---
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: kserve-webhook-server-cert
          namespace: kserve
        spec:
          dnsNames:
          - kserve-webhook-server-service.kserve.svc
          - kserve-webhook-server-service.kserve.svc.cluster.local
          issuerRef:
            kind: Issuer
            name: selfsigned-issuer
          secretName: kserve-webhook-server-cert
        EOF

    - name: 8-2. KServe를 RawDeployment 모드로 설정 및 이미지 패치
      shell: |
        # Knative 미사용 설정
        kubectl patch configmap inferenceservice-config -n kserve --type merge -p '{"data": {"deploy": "{\"defaultDeploymentMode\": \"RawDeployment\"}"}}'
        # 깨진 kube-rbac-proxy 이미지 패치 (gcr.io -> quay.io)
        kubectl set image deployment/kserve-controller-manager -n kserve kube-rbac-proxy=quay.io/brancz/kube-rbac-proxy:v0.13.1

    - name: 8-3. KServe 컨트롤러가 준비될 때까지 대기
      command: "kubectl wait --for=condition=Available deployment/kserve-controller-manager -n kserve --timeout=300s"

    - name: 11. ArgoCD Application 설정 적용 (GitOps 연결)
      command: "kubectl apply -f ../manifest-repo/argocd-app.yaml"

    - name: 🎉 [인프라 구축 완료 보고서]
      debug:
        msg:
          - "=========================================================="
          - " EKS 클러스터: {{ cluster_name }}"
          - " Cloudflare Tunnel을 통해 외부 접속 환경을 구성했습니다. (비용 $0)"
          - "----------------------------------------------------------"
          - " ArgoCD URL: https://argocd.bucheongoyangijanggun.com"
          - " ArgoCD Password: {{ argocd_password.stdout }}"
          - " Python App URL: https://app.bucheongoyangijanggun.com"
          - " [주의] GITHUB_PAT 환경변수가 설정되어 있어야 Git 업데이트가 가능합니다."
          - "=========================================================="
