apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hybrid-ai-stack
  namespace: argocd
  annotations:
    # 1. 감시할 이미지 목록 정의
    argocd-image-updater.argoproj.io/image-list: model=380958218266.dkr.ecr.ap-northeast-2.amazonaws.com/ai-serving-api

    # 2. 고유 SHA 태그(8자리)만 추적하고 latest 태그는 무시
    argocd-image-updater.argoproj.io/model.allow-tags: regexp:^[a-z0-9]{8}$

    # 3. 전략: 허용된 태그 중 가장 최근에 빌드된 이미지를 선택
    argocd-image-updater.argoproj.io/model.update-strategy: latest

    # 4. ArgoCD 파라미터 오버라이드 방식 사용
    argocd-image-updater.argoproj.io/write-back-method: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/Seungmin-Jeong2001/hybrid-ai-gitops_test.git
    targetRevision: HEAD
    path: manifest-repo
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
