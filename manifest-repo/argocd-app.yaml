apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hybrid-ai-stack
  namespace: argocd
  annotations:
    # 1. 감시할 이미지 목록 정의 (KServe 모델 이미지)
    argocd-image-updater.argoproj.io/image-list: model=380958218266.dkr.ecr.ap-northeast-2.amazonaws.com/ai-serving-api

    # 2. 업데이트 전략: 최신 빌드된 이미지 자동 추적
    argocd-image-updater.argoproj.io/model.update-strategy: latest

    # 3. 핵심: Imperative(argocd) 모드 설정 (GitHub에 커밋 안 함)
    argocd-image-updater.argoproj.io/write-back-method: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/Seungmin-Jeong2001/hybrid-ai-gitops_test.git # 실제 사용자 레포 주소로 변경 필요
    targetRevision: HEAD
    path: manifest-repo
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
